apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apple-vulkan-dra-node
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: apple-vulkan-dra-node
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apple-vulkan-dra-node
    spec:
      serviceAccountName: apple-vulkan-dra-node
      nodeSelector:
        idleloom-accelerator: apple-vulkan
      containers:
        - name: dra-node
          image: idleloom-vulkan-dra:dev
          args:
            - --driver-name=gpu.apple-vulkan.example
            - --allow-development-driver
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/xdg-cache
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: dev-dri
              mountPath: /dev/dri
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: kubelet-plugins
              mountPath: /var/lib/kubelet/plugins
            - name: kubelet-registry
              mountPath: /var/lib/kubelet/plugins_registry
            - name: cdi
              mountPath: /var/run/cdi
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: kubelet-plugins
          hostPath:
            path: /var/lib/kubelet/plugins
            type: DirectoryOrCreate
        - name: kubelet-registry
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
