---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: idleloomworkloads.ai.idleloom.io
spec:
  group: ai.idleloom.io
  names:
    kind: IdleloomWorkload
    listKind: IdleloomWorkloadList
    plural: idleloomworkloads
    shortNames:
    - ilw
    singular: idleloomworkload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.model.catalogRef
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              mode:
                enum:
                - Server
                - Shell
                type: string
              model:
                properties:
                  catalogRef:
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                required:
                - catalogRef
                type: object
              resources:
                properties:
                  unifiedMemoryRequest:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - unifiedMemoryRequest
                type: object
              shell:
                properties:
                  isolation:
                    enum:
                    - Sandbox
                    - Host
                    type: string
                  network:
                    enum:
                    - None
                    - Outbound
                    type: string
                  script:
                    maxLength: 65536
                    minLength: 1
                    type: string
                  timeoutSeconds:
                    format: int32
                    maximum: 86400
                    minimum: 1
                    type: integer
                required:
                - script
                type: object
            required:
            - mode
            - resources
            type: object
          status:
            properties:
              assignmentRef:
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                required:
                - name
                - namespace
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              resolvedArtifactDigest:
                type: string
              schedulingIntent:
                properties:
                  executionID:
                    type: string
                  fencingEpoch:
                    format: int64
                    type: integer
                  hostRef:
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  modelRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                      uid:
                        type: string
                    required:
                    - name
                    - uid
                    type: object
                  workloadGeneration:
                    format: int64
                    type: integer
                required:
                - executionID
                - fencingEpoch
                - hostRef
                - workloadGeneration
                type: object
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: spec is immutable; create a new workload to change it
          rule: self.spec == oldSelf.spec
        - message: unifiedMemoryRequest must be positive
          rule: quantity(self.spec.resources.unifiedMemoryRequest).isGreaterThan(quantity('0'))
        - message: Server requires model and Shell requires shell
          rule: (self.spec.mode == 'Server' && has(self.spec.model) && !has(self.spec.shell))
            || (self.spec.mode == 'Shell' && !has(self.spec.model) && has(self.spec.shell))
        - message: Host shell isolation requires outbound network access
          rule: '!has(self.spec.shell) || self.spec.shell.isolation != ''Host'' ||
            !has(self.spec.shell.network) || self.spec.shell.network == ''Outbound'''
    served: true
    storage: true
    subresources:
      status: {}
