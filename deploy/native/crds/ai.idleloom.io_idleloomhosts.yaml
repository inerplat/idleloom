                type: string
              modelFamilies:
                items:
                  type: string
                type: array
              observedGeneration:
                format: int64
                type: integer
              protocolVersion:
                type: string
              runtimeProfiles:
                items:
                  type: string
                type: array
              vulkanLeaseActive:
                type: boolean
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: host identity is immutable
