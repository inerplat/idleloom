---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: idleloomhosts.ai.idleloom.io
spec:
  group: ai.idleloom.io
  names:
    kind: IdleloomHost
    listKind: IdleloomHostList
    plural: idleloomhosts
    shortNames:
    - ilh
    singular: idleloomhost
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentID
      name: Agent
      type: string
    - jsonPath: .status.krunkitState
      name: Krunkit
      type: string
    - jsonPath: .status.availableUnifiedMemory
      name: Memory
      type: string
    name: v1alpha1
    schema:
