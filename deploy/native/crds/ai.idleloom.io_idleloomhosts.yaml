                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectivity:
                properties:
                  address:
                    type: string
                  interfaceName:
                    type: string
                  lastHandshakeTime:
                    format: date-time
                    type: string
                  mode:
