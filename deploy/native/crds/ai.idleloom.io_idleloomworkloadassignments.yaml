                        type: string
                      manifestDigest:
                        pattern: ^sha256:[a-f0-9]{64}$
                        type: string
                      ociReference:
                        pattern: ^oci://[a-z0-9.-]+(:[0-9]+)?/[a-z0-9._/-]+@sha256:[a-f0-9]{64}$
                        type: string
                      signature:
                        properties:
                          issuer:
                            minLength: 1
                            pattern: .*[[:graph:]].*
