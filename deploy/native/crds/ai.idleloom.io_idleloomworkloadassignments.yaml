                    maximum: 1
                    minimum: 1
                    type: integer
                  maxContextLength:
                    format: int32
                    maximum: 8192
                    minimum: 128
                    type: integer
                  runtimeProfile:
                    enum:
                    - mlx-lm-v1
                    type: string
                  unifiedMemoryRequest:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - artifact
                - catalogRef
                - family
                - maxConcurrentRequests
                - maxContextLength
                - runtimeProfile
                - unifiedMemoryRequest
                type: object
              shell:
                properties:
                  isolation:
