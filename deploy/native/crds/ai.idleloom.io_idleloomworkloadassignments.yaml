                required:
                - assignmentUID
                - executionID
                - fencingEpoch
                - observedGeneration
                - stoppedAt
                type: object
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: workload identity is immutable
          rule: self.spec.workloadRef == oldSelf.spec.workloadRef
        - message: host identity is immutable
          rule: self.spec.hostRef == oldSelf.spec.hostRef
        - message: resolved model is immutable
          rule: has(self.spec.model) == has(oldSelf.spec.model) && (!has(self.spec.model)
            || self.spec.model == oldSelf.spec.model)
        - message: resolved shell is immutable
          rule: has(self.spec.shell) == has(oldSelf.spec.shell) && (!has(self.spec.shell)
            || self.spec.shell == oldSelf.spec.shell)
        - message: execution identity is immutable
          rule: self.spec.executionID == oldSelf.spec.executionID
        - message: fencing epoch is immutable
          rule: self.spec.fencingEpoch == oldSelf.spec.fencingEpoch
        - message: lease duration is immutable
          rule: self.spec.leaseDurationSeconds == oldSelf.spec.leaseDurationSeconds
        - message: assignment mailbox object must be named active
          rule: self.metadata.name == 'active'
        - message: workload and host UIDs are required
          rule: size(self.spec.workloadRef.uid) > 0 && size(self.spec.hostRef.uid)
            > 0
        - message: exactly one resolved model or shell is required
          rule: has(self.spec.model) != has(self.spec.shell)
        - message: resolved model identity and memory request are required
          rule: '!has(self.spec.model) || (size(self.spec.model.catalogRef.uid) >
            0 && quantity(self.spec.model.unifiedMemoryRequest).isGreaterThan(quantity(''0'')))'
        - message: resolved shell memory request must be positive
          rule: '!has(self.spec.shell) || quantity(self.spec.shell.unifiedMemoryRequest).isGreaterThan(quantity(''0''))'
        - message: Host shell isolation requires outbound network access
          rule: '!has(self.spec.shell) || self.spec.shell.isolation != ''Host'' ||
            self.spec.shell.network == ''Outbound'''
