---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: idleloomworkloadassignments.ai.idleloom.io
spec:
  group: ai.idleloom.io
  names:
    kind: IdleloomWorkloadAssignment
    listKind: IdleloomWorkloadAssignmentList
    plural: idleloomworkloadassignments
    shortNames:
    - ilwa
    singular: idleloomworkloadassignment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.workloadRef.name
      name: Workload
      type: string
    - jsonPath: .spec.desiredState
      name: Desired
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              desiredState:
                enum:
                - Running
                - Stopped
                type: string
              executionID:
                format: uuid
                type: string
              fencingEpoch:
                format: int64
                minimum: 1
                type: integer
              hostRef:
                properties:
                  name:
                    minLength: 1
                    type: string
                  uid:
                    type: string
                required:
                - name
                - uid
                type: object
              leaseDurationSeconds:
                format: int32
                maximum: 300
                minimum: 10
                type: integer
              model:
                properties:
                  artifact:
                    properties:
                      format:
                        enum:
                        - mlx-safetensors-v1
                        - gguf-v1
                        type: string
                      ggufFile:
                        pattern: ^[A-Za-z0-9][A-Za-z0-9._-]{0,190}\.gguf$
                        type: string
                      manifestDigest:
                        pattern: ^sha256:[a-f0-9]{64}$
                        type: string
                      ociReference:
                        pattern: ^oci://[a-z0-9.-]+(:[0-9]+)?/[a-z0-9._/-]+@sha256:[a-f0-9]{64}$
                        type: string
                      ollamaModel:
                        pattern: ^[a-z0-9][a-z0-9._-]{0,127}:[a-z0-9][a-z0-9._-]{0,63}$
                        type: string
                      signature:
                        properties:
                          issuer:
                            minLength: 1
                            pattern: .*[[:graph:]].*
                            type: string
                          subject:
                            minLength: 1
                            pattern: .*[[:graph:]].*
                            type: string
                        required:
                        - issuer
                        - subject
                        type: object
                      sizeBytes:
                        format: int64
                        maximum: 68719476736
                        minimum: 1
                        type: integer
                    required:
                    - format
                    - manifestDigest
                    - sizeBytes
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one artifact source is required; OCI artifacts
                        require a signature and local GGUF sources are unsigned
                      rule: (has(self.ociReference) && !has(self.ollamaModel) && !has(self.ggufFile)
                        && has(self.signature)) || (!has(self.ociReference) && has(self.ollamaModel)
                        && !has(self.ggufFile) && !has(self.signature)) || (!has(self.ociReference)
                        && !has(self.ollamaModel) && has(self.ggufFile) && !has(self.signature))
                  batch:
                    properties:
                      maxTokens:
                        format: int32
                        maximum: 512
                        minimum: 1
                        type: integer
                      prompt:
                        maxLength: 16384
                        minLength: 1
                        type: string
                      timeoutSeconds:
                        format: int32
                        maximum: 3600
                        minimum: 1
                        type: integer
                    required:
                    - maxTokens
                    - prompt
                    type: object
                  catalogRef:
                    properties:
                      name:
                        minLength: 1
                        type: string
                      uid:
                        type: string
                    required:
                    - name
                    - uid
                    type: object
                  family:
                    enum:
                    - qwen3.5
                    - ollama-gguf
                    - gguf
                    type: string
                  maxConcurrentRequests:
                    format: int32
                    maximum: 1
                    minimum: 1
                    type: integer
                  maxContextLength:
                    format: int32
                    maximum: 8192
                    minimum: 128
                    type: integer
                  runtimeProfile:
                    enum:
                    - mlx-lm-v1
                    - ollama-gguf-v1
                    - llama-cpp-metal-v1
                    type: string
                  server:
                    properties:
                      authSecretName:
                        enum:
                        - active-serve-auth
                        type: string
                      modelAlias:
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                        type: string
                      port:
                        format: int32
                        maximum: 18080
                        minimum: 18080
                        type: integer
                      serviceName:
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z]([-a-z0-9]*[a-z0-9])?$
                        type: string
                    required:
                    - authSecretName
                    - modelAlias
                    - port
                    - serviceName
                    type: object
                  unifiedMemoryRequest:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - artifact
                - catalogRef
                - family
                - maxConcurrentRequests
                - maxContextLength
                - runtimeProfile
                - unifiedMemoryRequest
                type: object
                x-kubernetes-validations:
                - message: exactly one server or batch intent is required
                  rule: has(self.server) != has(self.batch)
                - message: resolved runtime profile, model family, and artifact source
                    must match
                  rule: (self.runtimeProfile == 'mlx-lm-v1' && self.family == 'qwen3.5'
                    && self.artifact.format == 'mlx-safetensors-v1' && has(self.artifact.ociReference))
                    || (self.runtimeProfile == 'ollama-gguf-v1' && self.family ==
                    'ollama-gguf' && self.artifact.format == 'gguf-v1' && has(self.artifact.ollamaModel))
                    || (self.runtimeProfile == 'llama-cpp-metal-v1' && self.family
                    == 'gguf' && self.artifact.format == 'gguf-v1' && has(self.artifact.ggufFile))
              run:
                properties:
                  attempt:
                    format: int32
                    maximum: 1000
                    minimum: 1
                    type: integer
                  experiment:
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  parameters:
                    additionalProperties:
                      maxLength: 4096
                      pattern: ^[^\x00]*$
                      type: string
                    maxProperties: 64
                    type: object
                  task:
                    enum:
                    - train
                    - infer
                    - serve
                    - shell
                    type: string
                required:
                - attempt
                - experiment
                - task
                type: object
              shell:
                properties:
                  isolation:
                    enum:
                    - Sandbox
                    - Host
                    type: string
                  network:
                    enum:
                    - None
                    - Outbound
                    type: string
                  script:
                    maxLength: 65536
                    minLength: 1
                    pattern: ^[^\x00]*$
                    type: string
                  timeoutSeconds:
                    format: int32
                    maximum: 86400
                    minimum: 1
                    type: integer
                  unifiedMemoryRequest:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - isolation
                - network
                - script
                - timeoutSeconds
                - unifiedMemoryRequest
                type: object
              training:
                properties:
                  network:
                    enum:
                    - None
                    - Outbound
                    type: string
                  runtimeProfile:
                    enum:
                    - mlx-train-v1
                    type: string
                  source:
                    maxLength: 65536
                    minLength: 1
                    pattern: ^[^\x00]*$
                    type: string
                  sourceDigest:
                    pattern: ^sha256:[a-f0-9]{64}$
                    type: string
                  timeoutSeconds:
                    format: int32
                    maximum: 86400
                    minimum: 1
                    type: integer
                  unifiedMemoryRequest:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - network
                - runtimeProfile
                - source
                - sourceDigest
                - timeoutSeconds
                - unifiedMemoryRequest
                type: object
              workloadRef:
                properties:
                  generation:
                    format: int64
                    minimum: 1
                    type: integer
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    minLength: 1
                    type: string
                  uid:
                    type: string
                required:
                - generation
                - name
                - namespace
                - uid
                type: object
            required:
            - desiredState
            - executionID
            - fencingEpoch
            - hostRef
            - leaseDurationSeconds
            - workloadRef
            type: object
          status:
            properties:
              agentID:
                type: string
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              executionID:
                type: string
              fencingEpoch:
                format: int64
                type: integer
              lastHeartbeatTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
              resolvedArtifactDigest:
                type: string
              run:
                properties:
                  artifacts:
                    items:
                      properties:
                        digest:
                          pattern: ^sha256:[a-f0-9]{64}$
                          type: string
                        name:
                          maxLength: 63
                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                          type: string
                        sizeBytes:
                          format: int64
                          maximum: 68719476736
                          minimum: 0
                          type: integer
                        uri:
                          maxLength: 4096
                          minLength: 1
                          pattern: ^[^\x00]*$
                          type: string
                      required:
                      - digest
                      - name
                      - uri
                      type: object
                    maxItems: 16
                    type: array
                  attempt:
                    format: int32
                    maximum: 1000
                    minimum: 1
                    type: integer
                  experiment:
                    maxLength: 63
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  finishedAt:
                    format: date-time
                    type: string
                  id:
                    format: uuid
                    type: string
                  metrics:
                    items:
                      properties:
                        name:
                          maxLength: 63
                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                          type: string
                        observedAt:
                          format: date-time
                          type: string
                        step:
                          format: int64
                          minimum: 0
                          type: integer
                        value:
                          maxLength: 128
                          pattern: ^-?(0|[1-9][0-9]*)(\.[0-9]+)?([eE][+-]?[0-9]+)?$
                          type: string
                      required:
                      - name
                      - observedAt
                      - value
                      type: object
                    maxItems: 32
                    type: array
                  startedAt:
                    format: date-time
                    type: string
                  task:
                    enum:
                    - train
                    - infer
                    - serve
                    - shell
                    type: string
                type: object
              runtimeVersion:
                type: string
              stopAcknowledgement:
                properties:
                  assignmentUID:
                    type: string
                  executionID:
                    type: string
                  fencingEpoch:
                    format: int64
                    type: integer
                  observedGeneration:
                    format: int64
                    type: integer
                  stoppedAt:
                    format: date-time
                    type: string
                required:
                - assignmentUID
                - executionID
                - fencingEpoch
                - observedGeneration
                - stoppedAt
                type: object
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: workload identity is immutable
          rule: self.spec.workloadRef == oldSelf.spec.workloadRef
        - message: host identity is immutable
          rule: self.spec.hostRef == oldSelf.spec.hostRef
        - message: resolved model is immutable
          rule: has(self.spec.model) == has(oldSelf.spec.model) && (!has(self.spec.model)
            || self.spec.model == oldSelf.spec.model)
        - message: resolved shell is immutable
          rule: has(self.spec.shell) == has(oldSelf.spec.shell) && (!has(self.spec.shell)
            || self.spec.shell == oldSelf.spec.shell)
        - message: resolved training run is immutable
          rule: has(self.spec.training) == has(oldSelf.spec.training) && (!has(self.spec.training)
            || self.spec.training == oldSelf.spec.training)
        - message: resolved run identity is immutable
          rule: has(self.spec.run) == has(oldSelf.spec.run) && (!has(self.spec.run)
            || self.spec.run == oldSelf.spec.run)
        - message: execution identity is immutable
          rule: self.spec.executionID == oldSelf.spec.executionID
        - message: fencing epoch is immutable
          rule: self.spec.fencingEpoch == oldSelf.spec.fencingEpoch
        - message: lease duration is immutable
          rule: self.spec.leaseDurationSeconds == oldSelf.spec.leaseDurationSeconds
        - message: assignment mailbox object must be named active
          rule: self.metadata.name == 'active'
        - message: workload and host UIDs are required
          rule: size(self.spec.workloadRef.uid) > 0 && size(self.spec.hostRef.uid)
            > 0
        - message: exactly one resolved model, shell, or training run is required
          rule: (has(self.spec.model) && !has(self.spec.shell) && !has(self.spec.training))
            || (!has(self.spec.model) && has(self.spec.shell) && !has(self.spec.training))
            || (!has(self.spec.model) && !has(self.spec.shell) && has(self.spec.training))
        - message: resolved model identity and memory request are required
          rule: '!has(self.spec.model) || (size(self.spec.model.catalogRef.uid) >
            0 && quantity(self.spec.model.unifiedMemoryRequest).isGreaterThan(quantity(''0'')))'
        - message: resolved shell memory request must be positive
          rule: '!has(self.spec.shell) || quantity(self.spec.shell.unifiedMemoryRequest).isGreaterThan(quantity(''0''))'
        - message: resolved training memory request must be positive
          rule: '!has(self.spec.training) || quantity(self.spec.training.unifiedMemoryRequest).isGreaterThan(quantity(''0''))'
        - message: resolved training requires train run identity
          rule: '!has(self.spec.training) || (has(self.spec.run) && self.spec.run.task
            == ''train'')'
        - message: resolved run task must match the execution intent
          rule: '!has(self.spec.run) || (has(self.spec.model) && has(self.spec.model.server)
            && self.spec.run.task == ''serve'') || (has(self.spec.model) && has(self.spec.model.batch)
            && self.spec.run.task == ''infer'') || (has(self.spec.shell) && self.spec.run.task
            == ''shell'') || (has(self.spec.training) && self.spec.run.task == ''train'')'
        - message: resolved run parameter names must be safe environment names and
            must not use IDLELOOM_
          rule: '!has(self.spec.run) || !has(self.spec.run.parameters) || self.spec.run.parameters.all(k,
            k.matches(''^[A-Z][A-Z0-9_]{0,62}$'') && !k.startsWith(''IDLELOOM_''))'
        - message: Host shell isolation requires outbound network access
          rule: '!has(self.spec.shell) || self.spec.shell.isolation != ''Host'' ||
            self.spec.shell.network == ''Outbound'''
    served: true
    storage: true
    subresources:
      status: {}
