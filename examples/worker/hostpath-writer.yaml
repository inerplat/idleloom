apiVersion: batch/v1
kind: Job
metadata:
  name: idleloom-hostpath-writer
  namespace: default
  labels:
    app.kubernetes.io/managed-by: idleloom
    ai.idleloom.io/example: worker-hostpath
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: idleloom
        ai.idleloom.io/example: worker-hostpath
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
        idleloom-worker: "true"
      tolerations:
        - key: idleloom-dedicated
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: prepare
          image: docker.io/library/python:3.12.10-slim-bookworm@sha256:fd95fa221297a88e1cf49c55ec1828edd7c5a428187e67b5d1805692d11588db
          command: ["/bin/sh", "-ec", "chown 65532:65532 /data"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN"]
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: writer
          image: docker.io/library/python:3.12.10-slim-bookworm@sha256:fd95fa221297a88e1cf49c55ec1828edd7c5a428187e67b5d1805692d11588db
          command: ["/bin/sh", "-ec"]
          args:
            - |
              printf 'persistent worker data\n' > /data/marker.txt
              cat /data/marker.txt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /var/lib/idleloom/volumes/docs-smoke
            type: DirectoryOrCreate
