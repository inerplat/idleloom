apiVersion: v1
kind: Pod
metadata:
  name: idleloom-worker-toolbox
  namespace: default
  labels:
    app.kubernetes.io/managed-by: idleloom
    ai.idleloom.io/example: worker-toolbox
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/os: linux
    idleloom-worker: "true"
  tolerations:
    - key: idleloom-dedicated
      operator: Exists
      effect: NoSchedule
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: toolbox
      image: docker.io/library/python:3.12.10-slim-bookworm@sha256:fd95fa221297a88e1cf49c55ec1828edd7c5a428187e67b5d1805692d11588db
      command: ["/bin/sh", "-ec"]
      args:
        - |
          printf 'idleloom worker toolbox\n' > /work/index.html
          exec python -m http.server 8000 --directory /work
      ports:
        - name: http
          containerPort: 8000
      readinessProbe:
        httpGet:
          path: /
          port: http
        periodSeconds: 2
        timeoutSeconds: 1
        failureThreshold: 30
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: work
          mountPath: /work
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: work
      emptyDir: {}
    - name: tmp
      emptyDir: {}
