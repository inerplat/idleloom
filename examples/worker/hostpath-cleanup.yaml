apiVersion: batch/v1
kind: Job
metadata:
  name: idleloom-hostpath-cleanup
  namespace: default
  labels:
    app.kubernetes.io/managed-by: idleloom
    ai.idleloom.io/example: worker-hostpath
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: idleloom
        ai.idleloom.io/example: worker-hostpath
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
        idleloom-worker: "true"
      tolerations:
        - key: idleloom-dedicated
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cleanup
          image: docker.io/library/python:3.12.10-slim-bookworm@sha256:fd95fa221297a88e1cf49c55ec1828edd7c5a428187e67b5d1805692d11588db
          command: ["/bin/sh", "-ec", "rm -rf /volumes/docs-smoke"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["DAC_OVERRIDE", "FOWNER"]
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - name: volumes
              mountPath: /volumes
      volumes:
        - name: volumes
          hostPath:
            path: /var/lib/idleloom/volumes
            type: Directory
