apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: {{ quote .Name }}
  namespace: {{ quote .Namespace }}
  labels:
    app.kubernetes.io/managed-by: idleloom
    ai.idleloom.io/run: {{ quote .Name }}
    ai.idleloom.io/task: infer
    ai.idleloom.io/backend: worker
    ai.idleloom.io/runtime: llama-vulkan
  annotations:
    ai.idleloom.io/recipe: {{ quote .RecipeID }}
    ai.idleloom.io/recipe-digest: {{ quote .RecipeDigest }}
    ai.idleloom.io/input-digest: {{ quote .InputDigest }}
spec:
  devices:
    requests:
    - name: accelerator
      exactly:
        deviceClassName: {{ quote (index .Values "deviceClass") }}
        allocationMode: ExactCount
        count: 1
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ quote .Name }}
  namespace: {{ quote .Namespace }}
  labels:
    app.kubernetes.io/managed-by: idleloom
    ai.idleloom.io/run: {{ quote .Name }}
    ai.idleloom.io/task: infer
    ai.idleloom.io/backend: worker
    ai.idleloom.io/runtime: llama-vulkan
  annotations:
    ai.idleloom.io/recipe: {{ quote .RecipeID }}
    ai.idleloom.io/recipe-digest: {{ quote .RecipeDigest }}
    ai.idleloom.io/input-digest: {{ quote .InputDigest }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ integer (index .Values "timeoutSeconds") }}
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: idleloom
        ai.idleloom.io/run: {{ quote .Name }}
        ai.idleloom.io/task: infer
        ai.idleloom.io/backend: worker
        ai.idleloom.io/runtime: llama-vulkan
      annotations:
        ai.idleloom.io/recipe: {{ quote .RecipeID }}
        ai.idleloom.io/recipe-digest: {{ quote .RecipeDigest }}
        ai.idleloom.io/input-digest: {{ quote .InputDigest }}
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
        idleloom-worker: "true"
        idleloom-accelerator: apple-vulkan
      tolerations:
      - key: idleloom-dedicated
        operator: Exists
        effect: NoSchedule
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      resourceClaims:
      - name: gpu
        resourceClaimName: {{ quote .Name }}
      initContainers:
      - name: model-fetch
        image: quay.io/ramalama/ramalama@sha256:abe07beba518d6864738a67af8ea3511cdaa4b24efb197740967d0d8e19419e4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          curl --fail --location --retry 3 --output /models/model.gguf "$MODEL_URL"
          echo "$MODEL_SHA256  /models/model.gguf" | sha256sum -c -
        env:
        - name: MODEL_URL
          value: {{ quote (index .Values "modelURL") }}
        - name: MODEL_SHA256
          value: {{ quote (index .Values "modelSHA256") }}
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
        volumeMounts:
        - name: model
          mountPath: /models
      containers:
      - name: inference
        image: quay.io/ramalama/ramalama@sha256:abe07beba518d6864738a67af8ea3511cdaa4b24efb197740967d0d8e19419e4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        args:
        - |
          devices="$(/usr/bin/llama-cli --list-devices 2>&1)"
          printf '%s\n' "$devices"
          printf '%s\n' "$devices" | grep -Eq 'Vulkan[0-9]+: Virtio-GPU Venus'
          exec /usr/bin/llama-cli "$@"
        - idleloom-llama
        - --model
        - /models/model.gguf
        - --prompt
        - {{ quote (index .Values "prompt") }}
        - --predict
        - {{ quote (index .Values "maxTokens") }}
        - --gpu-layers
        - "99"
        - --ctx-size
        - "2048"
        - --no-display-prompt
        - --single-turn
        - --simple-io
        env:
        - name: VK_ICD_FILENAMES
          value: /usr/share/vulkan/icd.d/virtio_icd.aarch64.json
        - name: HOME
          value: /tmp
        - name: XDG_CACHE_HOME
          value: /tmp/xdg-cache
        resources:
          requests:
            cpu: {{ quote (index .Values "cpu") }}
            memory: {{ quote (index .Values "memory") }}
          limits:
            cpu: {{ quote (index .Values "cpu") }}
            memory: {{ quote (index .Values "memory") }}
          claims:
          - name: gpu
            request: accelerator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
        volumeMounts:
        - name: model
          mountPath: /models
          readOnly: true
        - name: runtime-cache
          mountPath: /tmp
      volumes:
      - name: model
        emptyDir:
          sizeLimit: {{ quote (index .Values "modelStorage") }}
      - name: runtime-cache
        emptyDir: {}
