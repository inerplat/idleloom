name: infer/mlx-batch
version: v1
description: Run one prompt with the locked MLX model on a Native Metal host.
task: infer
backend: native
runtime: mlx
manifest: native-workload.yaml
parametersSchema: parameters.schema.json
example: example.yaml
prerequisites:
- A joined Native Metal host; the locked runtime and model are prepared on first use.
- The built-in qwen3-5-0-8b-mlx model catalog installed by idlectl join.
