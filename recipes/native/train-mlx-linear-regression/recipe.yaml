name: train/mlx-linear-regression
version: v1
description: Run a tracked MLX training example with metrics and a checkpoint on a Native Metal host.
task: train
backend: native
runtime: mlx
manifest: native-workload.yaml
parametersSchema: parameters.schema.json
example: example.yaml
prerequisites:
- A joined Native Metal host; Idleloom prepares the locked MLX runtime on first use.
- macOS 26 or later for the locked MLX 0.32 wheels.
- Python 3.12 available on the joined Mac for first-use runtime preparation.
