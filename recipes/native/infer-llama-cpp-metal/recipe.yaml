name: infer/llama-cpp-metal
version: v1
description: Run one prompt against a digest-pinned GGUF file with llama.cpp and full Apple Metal offload.
task: infer
backend: native
runtime: llama-cpp-metal
manifest: native-workload.yaml
parametersSchema: parameters.schema.json
example: example.yaml
prerequisites:
- A joined Native Metal host with llama-server available on PATH.
- The exact GGUF file installed under the host's managed models/gguf directory.
- A cluster-scoped IdleloomModel that pins the GGUF filename, size, and SHA-256 digest.
